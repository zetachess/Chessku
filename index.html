<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chessku</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Chessku</h1>
        <p id="dailyLabel"></p>
      </div>
      <button class="icon-btn" id="shareBtn" type="button" title="Compartir">↗</button>
    </header>

    <section class="board-wrap" aria-label="Chessku diario">
      <table class="sudoku-table" id="sudokuTable"></table>
    </section>

    <section class="piece-pad" id="piecePad" aria-label="Piezas"></section>

    <footer class="footer">
      <button class="small-btn" id="clearBtn" type="button">Borrar</button>
      <div>
        <strong id="movesDisplay">0</strong>
        <span>movs</span>
      </div>
      <p id="countdown">Nuevo Chessku en --:--:--</p>
    </footer>

    <p class="status" id="statusLine">Elige una casilla</p>
  </main>

  <div class="modal" id="winModal">
    <div class="modal-card">
      <h2>Chessku completado</h2>
      <p id="winText"></p>
      <button class="small-btn primary" id="modalShareBtn" type="button">Compartir</button>
      <button class="small-btn" id="closeModalBtn" type="button">Cerrar</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
